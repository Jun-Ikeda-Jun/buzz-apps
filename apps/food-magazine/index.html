<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
  <title>Food Magazine Maker - 料理を雑誌の表紙に</title>
  <meta name="description" content="料理の写真をアップロードするだけで、料理雑誌の表紙風画像に変換。全処理ブラウザ完結、画像はどこにも送信されません。">
  <!-- OGP: SNSシェア時の表示 -->
  <meta property="og:title" content="Food Magazine Maker - 料理を雑誌の表紙に">
  <meta property="og:description" content="あなたの料理が雑誌の表紙に 🍽️✨">
  <meta property="og:type" content="website">
  <!-- スマホ: フルスクリーン/PWA風 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1>🍽️ Food Magazine Maker</h1>
      <p>料理の写真をアップロードして料理雑誌の表紙風に変換</p>
    </header>

    <!-- Step 1: アップロード -->
    <div id="upload-section">
      <div class="drop-zone" id="drop-zone">
        <div class="icon">📷</div>
        <div class="text">料理の写真をドロップ or タップして選択</div>
      </div>
    </div>

    <!-- Step 2: テンプレ選択 -->
    <div id="template-section" style="display:none">
      <p style="text-align:center; margin-bottom:12px; color:#aaa; font-size:0.9rem">表紙スタイルを選択</p>
      <div class="template-grid" id="template-grid"></div>
    </div>

    <!-- プログレス -->
    <div id="progress-section" style="display:none">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="status" id="status">画像を準備中...</div>
    </div>

    <!-- Step 3: プレビュー & 操作 -->
    <div id="result-section" style="display:none">
      <div class="preview-area">
        <canvas id="canvas"></canvas>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-download">💾 保存</button>
        <a class="btn btn-share" id="btn-share" target="_blank" rel="noopener">𝕏 シェア</a>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-retry" style="background:#222;color:#fff">🔄 別の写真で作る</button>
      </div>
    </div>

    <footer class="app-footer">
      <p>画像はサーバーに送信されません。全てブラウザ内で処理されます。</p>
    </footer>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
