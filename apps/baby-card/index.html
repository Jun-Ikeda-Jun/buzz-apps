<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
  <title>Baby Card Maker - 赤ちゃんの成長カードを作ろう</title>
  <meta name="description" content="赤ちゃんの写真から月齢入り成長記録カードを作成。全処理ブラウザ完結、画像はどこにも送信されません。">
  <!-- OGP: SNSシェア時の表示 -->
  <meta property="og:title" content="Baby Card Maker - 赤ちゃんの成長カードを作ろう">
  <meta property="og:description" content="赤ちゃんの成長をかわいいカードに 👶✨">
  <meta property="og:type" content="website">
  <!-- スマホ: フルスクリーン/PWA風 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1>👶 Baby Card Maker</h1>
      <p>赤ちゃんの成長カードを作ろう</p>
    </header>

    <!-- Step 1: アップロード -->
    <div id="upload-section">
      <div class="drop-zone" id="drop-zone">
        <div class="icon">📷</div>
        <div class="text">赤ちゃんの写真をドロップ or タップして選択</div>
      </div>
    </div>

    <!-- 月齢・名前入力 -->
    <div id="input-section" style="display:none">
      <div class="input-row">
        <input type="number" id="input-months" class="input-field" min="0" max="36" placeholder="月齢">
        <span class="input-label">ヶ月</span>
      </div>
      <div class="input-row">
        <input type="text" id="input-name" class="input-field input-field-name" placeholder="お名前（任意）">
      </div>
    </div>

    <!-- Step 2: テンプレ選択 -->
    <div id="template-section" style="display:none">
      <p style="text-align:center; margin-bottom:12px; color:#aaa; font-size:0.9rem">カードスタイルを選択</p>
      <div class="template-grid" id="template-grid"></div>
    </div>

    <!-- プログレス -->
    <div id="progress-section" style="display:none">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="status" id="status">背景を処理中...</div>
    </div>

    <!-- Step 3: プレビュー & 操作 -->
    <div id="result-section" style="display:none">
      <div class="preview-area">
        <canvas id="canvas"></canvas>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-download">💾 保存</button>
        <a class="btn btn-share" id="btn-share" target="_blank" rel="noopener">𝕏 シェア</a>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-retry" style="background:#222;color:#fff">🔄 別の写真で作る</button>
      </div>
    </div>

    <footer class="app-footer">
      <p>画像はサーバーに送信されません。全てブラウザ内で処理されます。</p>
    </footer>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
